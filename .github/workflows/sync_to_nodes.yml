name: Sync to All Nodes
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false # Important: prevents conflict with PAT

      - name: Prepare Clean Code
        run: |
          # Remove its own workflow directory before syncing to node repos
          rm -rf .github/workflows
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Sync: remove workflows for nodes" || echo "No changes"

      - name: Push to Node Repos
        env:
          PAT: ${{ secrets.SYNC_PAT }}
          PREFIX: "doh-node"
          COUNT: 100
          CONCURRENCY: 15 # Increased concurrency for speed
        run: |
          OWNER="${{ github.repository_owner }}"
          
          push_with_retry() {
            local repo=$1
            local url=$2
            local attempt=1
            local max_attempts=3
            
            while [ $attempt -le $max_attempts ]; do
              echo "  [Attempt $attempt] Syncing $repo..."
              if git push "$url" HEAD:main --force; then
                echo "  [SUCCESS] $repo synchronized."
                return 0
              else
                echo "  [WARNING] $repo failed. Retrying in 2s..."
                sleep 2
                attempt=$((attempt + 1))
              fi
            done
            echo "  [ERROR] $repo failed after $max_attempts attempts."
            return 1
          }

          for i in $(seq -f "%03g" 1 $COUNT); do
            REPO_NAME="${PREFIX}-${i}"
            REMOTE_URL="https://x-access-token:${PAT}@github.com/${OWNER}/${REPO_NAME}.git"
            
            # Run push with retry in background
            push_with_retry "$REPO_NAME" "$REMOTE_URL" &
            
            # Limit concurrency
            if [[ $(jobs -r | wc -l) -ge $CONCURRENCY ]]; then
              wait -n
            fi
          done
          
          wait
          echo "All nodes sync process finished."



